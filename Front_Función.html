
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora Cuadrática</title>
    <link rel="stylesheet" href="Estilo_Front.css">
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
</head>
<body>
    <div class="container">
        <h2>Calculadora de Función Cuadrática</h2>
        <div class="inputs">
            <label>A: <input type="number" id="coef_a" value="1" step="0.5"></label>
            <label>B: <input type="number" id="coef_b" value="0" step="0.5"></label>
            <label>C: <input type="number" id="coef_c" value="0" step="0.5"></label>
            <label>x Min: <input type="number" id="x_min" value="-3" step="0.5"></label>
            <label>x Max: <input type="number" id="x_max" value="3" step="0.5"></label>
            <button onclick="graficar()">Graficar</button>
        </div>
        <div id="funcion"></div>
        <div id="grafica"></div>
    </div>

    <script>
        function graficar() {
            let a = parseFloat(document.getElementById("coef_a").value);
            let b = parseFloat(document.getElementById("coef_b").value);
            let c = parseFloat(document.getElementById("coef_c").value);
            let x_min = parseFloat(document.getElementById("x_min").value);
            let x_max = parseFloat(document.getElementById("x_max").value);

            document.getElementById("funcion").innerText = 
                `f(x) = ${a}x² + ${b}x + ${c}`;

            let x = [];
            let y = [];
            for (let i = x_min; i <= x_max; i += 0.1) {
                x.push(i);
                y.push(a * i * i + b * i + c);
            }

            let trace = {
                x: x,
                y: y,
                type: 'scatter',
                mode: 'lines',
                line: {color: '#a12312'}
            };

            let layout = {
                title: 'Gráfica de la función cuadrática',
                xaxis: { title: 'x' },
                yaxis: { title: 'f(x)' },
                plot_bgcolor: '#F9F9F9',
                paper_bgcolor: '#F9F9F9'
            };

            Plotly.newPlot('grafica', [trace], layout);
        }

        graficar();
    </script>
</body>
</html>
