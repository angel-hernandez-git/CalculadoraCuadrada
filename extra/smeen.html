<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Función Cuadrática y Derivada</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <link rel="stylesheet" href="/Estilo_Front.css">
</head>
<body>
    <div class="container">
        <h2>Calculadora de Función Cuadrática</h2>
        <div class="inputs">
            <label>A: <input type="number" id="coef_a" value="1" step="0.5"></label>
            <label>B: <input type="number" id="coef_b" value="0" step="0.5"></label>
            <label>C: <input type="number" id="coef_c" value="0" step="0.5"></label>
            <label>x Min: <input type="number" id="x_min" value="-3" step="0.5"></label>
            <label>x Max: <input type="number" id="x_max" value="3" step="0.5"></label>
            <button onclick="graficar()">Graficar</button>
        </div>
        <div id="funcion"></div>
        <div id="derivada"></div>
        <div id="grafica"></div>
    </div>

    <script>
        function graficar() {
            let a = parseFloat(document.getElementById("coef_a").value);
            let b = parseFloat(document.getElementById("coef_b").value);
            let c = parseFloat(document.getElementById("coef_c").value);
            let x_min = parseFloat(document.getElementById("x_min").value);
            let x_max = parseFloat(document.getElementById("x_max").value);

            // Mostrar función y derivada
            document.getElementById("funcion").innerText = `f(x) = ${a}x² + ${b}x + ${c}`;
            document.getElementById("derivada").innerText = `f'(x) = ${2*a}x + ${b}`;

            // Datos para f(x)
            let x = [], y = [], y_derivada = [];
            for (let i = x_min; i <= x_max; i += 0.1) {
                x.push(i);
                y.push(a * i * i + b * i + c);
                y_derivada.push(2*a*i + b);
            }

            let trace_funcion = {
                x: x,
                y: y,
                type: 'scatter',
                mode: 'lines',
                line: {color: '#a12312'},
                name: 'f(x)'
            };

            let trace_derivada = {
                x: x,
                y: y_derivada,
                type: 'scatter',
                mode: 'lines',
                line: {color: '#1255a1'},
                name: "f'(x)"
            };

            let layout = {
                title: 'Función cuadrática y su derivada',
                xaxis: { title: 'x' },
                yaxis: { title: 'Valores' },
                plot_bgcolor: '#F9F9F9',
                paper_bgcolor: '#F9F9F9'
            };

            Plotly.newPlot('grafica', [trace_funcion, trace_derivada], layout);
        }

        graficar();
    </script>
</body>
</html>
